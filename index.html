<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>利息試算工具｜手機版</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --grid: #000000;
      --text: #1f2937;
      --muted: #6b7280;
      --title-gray: #6e6e6e;
      --title-blue: #366092;
      --sub-blue: #dbe5f1;
      --head-gray: #bfbfbf;
      --head-blue: #c6d9f0;
      --head-blue-strong: #8db3e2;
      --input-yellow: #fff200;
      --danger: #b91c1c;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      --radius: 16px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      line-height: 1.45;
    }

    body { padding: 12px; }
    .wrap { width: 100%; max-width: 780px; margin: 0 auto; }
    .toolbar { display: grid; gap: 10px; margin-bottom: 12px; }
    .brand-box {
      background: var(--card);
      border: 1px solid #d6dbe3;
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .brand { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
    .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .btn {
      appearance: none;
      border: 1px solid #cfd6df;
      background: #fff;
      color: #111827;
      border-radius: 12px;
      padding: 12px 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 800;
      min-height: 46px;
    }
    .sheet {
      background: var(--card);
      border: 1px solid #d7dce4;
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel, .summary-card {
      border: 2px solid var(--grid);
      background: #fff;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .panel-title, .summary-head {
      color: #fff;
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      padding: 12px 10px;
      letter-spacing: 1px;
    }
    .panel-title.gray { background: var(--title-gray); }
    .summary-head { background: var(--title-blue); }
    .summary-sub {
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      padding: 10px;
      background: var(--sub-blue);
    }
    table.sheet-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .sheet-table td, .sheet-table th {
      border: 2px solid var(--grid);
      padding: 10px 8px;
      font-size: 15px;
      vertical-align: middle;
      word-break: break-word;
    }
    .label { background: #fff; text-align: right; font-weight: 800; }
    .note { color: #555; font-size: 12px; line-height: 1.5; }
    .center { text-align: center; }
    .right { text-align: right; }
    .input-cell { background: var(--input-yellow); font-weight: 800; padding: 0 !important; }
    .input-cell input, .input-cell select {
      width: 100%; border: 0; background: transparent; padding: 14px 12px; font-size: 18px;
      font-weight: 800; text-align: right; outline: none; font-family: inherit; color: #111827; min-height: 48px;
    }
    .input-cell select { text-align-last: right; }
    .summary td { font-size: 15px; }
    .summary .v { font-size: 30px; font-weight: 400; text-align: right; }
    .summary .ratio { font-size: 20px; color: #374151; text-align: right; white-space: nowrap; }
    .detail-wrap {
      overflow: auto; border: 2px solid var(--grid); background: #fff; -webkit-overflow-scrolling: touch;
    }
    .detail-table {
      width: 100%; min-width: 650px; border-collapse: collapse; table-layout: fixed; background: #fff;
    }
    .detail-table th, .detail-table td { border: 1px solid var(--grid); padding: 8px 8px; font-size: 14px; }
    .detail-table tbody tr:nth-child(even) { background: #fafafa; }
    .gray-head { background: var(--head-gray); }
    .blue-head { background: var(--head-blue); }
    .blue-head-strong { background: var(--head-blue-strong); }
    .error { color: var(--danger); font-weight: 800; }

    @media (max-width: 640px) {
      body { padding: 8px; }
      .sheet { padding: 8px; border-radius: 14px; }
      .panel-title, .summary-head { font-size: 20px; }
      .summary-sub { font-size: 14px; }
      .sheet-table td, .sheet-table th { font-size: 14px; padding: 8px 6px; }
      .summary .v { font-size: 24px; }
      .summary .ratio { font-size: 18px; }
      .action-grid { grid-template-columns: repeat(2, 1fr); }
      .mobile-stack colgroup { display: none; }
      .mobile-stack, .mobile-stack tbody, .mobile-stack tr, .mobile-stack td { display: block; width: 100%; }
      .mobile-stack tr { border-bottom: 2px solid var(--grid); }
      .mobile-stack tr:last-child { border-bottom: 0; }
      .mobile-stack td { border: 0; border-top: 2px solid var(--grid); }
      .mobile-stack td:first-child { border-top: 0; }
      .mobile-stack .label, .mobile-stack .note, .mobile-stack .center, .mobile-stack .right { text-align: left; }
      .mobile-stack .input-cell input, .mobile-stack .input-cell select { text-align: left; font-size: 17px; }
      .brand { font-size: 20px; }
    }

    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .wrap { max-width: none; }
      .sheet { box-shadow: none; border: 0; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div class="brand-box">
        <div class="brand">利息試算工具</div>
      </div>
      <div class="action-grid">
        <button class="btn" id="calcBtn">重新試算</button>
        <button class="btn" id="excelBtn">匯出成 Excel</button>
        <button class="btn" id="printBtn">列印</button>
        <button class="btn" id="resetBtn">重設</button>
      </div>
    </div>

    <div class="sheet">
      <div class="panel">
        <div class="panel-title gray">貸款試算</div>
        <table class="sheet-table mobile-stack">
          <colgroup>
            <col style="width: 28%" />
            <col style="width: 26%" />
            <col style="width: 46%" />
          </colgroup>
          <tr>
            <td class="label">貸款金額</td>
            <td class="input-cell"><input id="loanAmount" type="number" value="8800000" step="10000" inputmode="numeric" /></td>
            <td class="note">元 - 請輸入借款總額</td>
          </tr>
          <tr>
            <td class="label">年利率</td>
            <td class="input-cell"><input id="annualRate" type="number" value="2.2" step="0.001" inputmode="decimal" /></td>
            <td class="note">% - 可輸入到小數點第 3 位</td>
          </tr>
          <tr>
            <td class="label">貸款年限</td>
            <td class="input-cell"><input id="loanYears" type="number" value="30" step="1" inputmode="numeric" /></td>
            <td class="note">年 - 自動依年限完整列出所有期數</td>
          </tr>
        </table>
      </div>

      <div class="summary-card">
        <div class="summary-head">定額年金（本息平均）償還法</div>
        <div class="summary-sub">每期償還固定金額</div>
        <table class="sheet-table summary mobile-stack">
          <colgroup>
            <col style="width: 36%" />
            <col style="width: 42%" />
            <col style="width: 22%" />
          </colgroup>
          <tr>
            <td class="label">每月繳款金額</td>
            <td class="v" id="sumMonthlyPayment">-</td>
            <td></td>
          </tr>
          <tr>
            <td class="label">總繳金額</td>
            <td class="v" id="sumEqualTotalPaid">-</td>
            <td></td>
          </tr>
          <tr>
            <td class="label">總繳利息</td>
            <td class="v" id="sumEqualInterest">-</td>
            <td class="ratio" id="sumEqualInterestRatio">-</td>
          </tr>
          <tr>
            <td class="label">長期年化利率</td>
            <td class="v" id="sumEqualLongRate">-</td>
            <td></td>
          </tr>
        </table>
      </div>

      <div class="detail-wrap">
        <table class="detail-table" id="detailTable">
          <thead>
            <tr>
              <th class="gray-head">期數</th>
              <th class="blue-head">還本金額</th>
              <th class="blue-head">繳息金額</th>
              <th class="blue-head-strong">本息合計</th>
              <th class="blue-head">貸款餘額</th>
              <th class="gray-head">當期利率</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const formatMoney = (num, digits = 0) => Number(num || 0).toLocaleString('zh-Hant-TW', {
      minimumFractionDigits: digits,
      maximumFractionDigits: digits,
    });
    const formatPercent = (num, digits = 1) => `${Number(num || 0).toFixed(digits)}%`;

    function getInputs() {
      const loanYears = Number($('loanYears').value || 0);
      return {
        loanAmount: Number($('loanAmount').value || 0),
        annualRate: Number($('annualRate').value || 0),
        loanYears,
        loanMonths: Math.round(loanYears * 12),
      };
    }

    function calcPayment(principal, monthlyRate, monthsLeft) {
      if (monthsLeft <= 0) return 0;
      if (monthlyRate === 0) return principal / monthsLeft;
      return principal * monthlyRate / (1 - Math.pow(1 + monthlyRate, -monthsLeft));
    }

    function calculateEqualPayment(inputs) {
      const rows = [];
      let balance = inputs.loanAmount;
      let totalInterest = 0;
      let totalPaid = 0;
      const monthlyRate = inputs.annualRate / 100 / 12;
      const fixedPayment = calcPayment(balance, monthlyRate, inputs.loanMonths);

      for (let m = 1; m <= inputs.loanMonths; m += 1) {
        const interestPaid = balance * monthlyRate;
        let principalPaid = fixedPayment - interestPaid;
        let payment = fixedPayment;

        if (m === inputs.loanMonths || principalPaid > balance) {
          principalPaid = balance;
          payment = principalPaid + interestPaid;
        }

        balance -= principalPaid;
        if (balance < 0.01) balance = 0;
        totalInterest += interestPaid;
        totalPaid += payment;

        rows.push({ month: m, principalPaid, interestPaid, payment, balance, annualRate: inputs.annualRate });
      }

      return { rows, totalInterest, totalPaid, monthlyPayment: fixedPayment };
    }

    function renderSummary(inputs, result) {
      $('sumMonthlyPayment').textContent = formatMoney(result.monthlyPayment);
      $('sumEqualTotalPaid').textContent = formatMoney(result.totalPaid);
      $('sumEqualInterest').textContent = formatMoney(result.totalInterest);
      $('sumEqualInterestRatio').textContent = formatPercent((result.totalInterest / inputs.loanAmount) * 100, 1);
      $('sumEqualLongRate').textContent = formatPercent(inputs.annualRate, 3);
    }

    function renderDetail(rows) {
      const tbody = $('detailBody');
      tbody.innerHTML = '';
      for (let i = 0; i < rows.length; i += 1) {
        const r = rows[i];
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="right">${r.month}</td>
          <td class="right">${formatMoney(r.principalPaid)}</td>
          <td class="right">${formatMoney(r.interestPaid)}</td>
          <td class="right">${formatMoney(r.payment)}</td>
          <td class="right">${formatMoney(r.balance)}</td>
          <td class="right">${formatPercent(r.annualRate, 3)}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    function exportExcel() {
      const inputs = getInputs();
      const result = calculateEqualPayment(inputs);
      const conditionRows = [
        ['利息試算結果匯出'],
        ['匯出時間', new Date().toLocaleString('zh-Hant-TW')],
        ['貸款金額', Math.round(inputs.loanAmount)],
        ['年利率(%)', inputs.annualRate],
        ['貸款年限', inputs.loanYears],
        ['貸款期數(月)', inputs.loanMonths],
        ['每月繳款金額', Math.round(result.monthlyPayment)],
        ['總繳金額', Math.round(result.totalPaid)],
        ['總繳利息', Math.round(result.totalInterest)],
        ['長期年化利率', `${Number(inputs.annualRate || 0).toFixed(3)}%`],
      ];
      const detailHeader = ['期數','還本金額','繳息金額','本息合計','貸款餘額','當期利率'];
      const detailRows = result.rows.map(r => [
        r.month,
        Math.round(r.principalPaid),
        Math.round(r.interestPaid),
        Math.round(r.payment),
        Math.round(r.balance),
        `${Number(r.annualRate || 0).toFixed(3)}%`
      ]);

      const esc = (v) => String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const makeRows = (rows, header=false) => rows.map(row => `<tr>${row.map(cell => header ? `<th style="border:1px solid #000;padding:8px 10px;background:#dbe5f1;">${esc(cell)}</th>` : `<td style="border:1px solid #000;padding:8px 10px;">${esc(cell)}</td>`).join('')}</tr>`).join('');

      const htmlContent = `
      <html xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:x="urn:schemas-microsoft-com:office:excel"
            xmlns="http://www.w3.org/TR/REC-html40">
      <head>
        <meta charset="UTF-8">
        <!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>利息試算</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
      </head>
      <body>
        <table>
          ${makeRows(conditionRows)}
          <tr><td colspan="6" style="height:16px;"></td></tr>
          ${makeRows([detailHeader], true)}
          ${makeRows(detailRows)}
        </table>
      </body>
      </html>`;

      const blob = new Blob(['﻿' + htmlContent], { type: 'application/vnd.ms-excel;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '利息試算結果.xls';
      a.click();
      URL.revokeObjectURL(url);
    }

    function validate(inputs) {
      if (inputs.loanAmount <= 0) throw new Error('貸款金額需大於 0');
      if (inputs.loanYears <= 0) throw new Error('貸款年限需大於 0');
      if (inputs.loanMonths <= 0) throw new Error('貸款期數需大於 0');
    }

    function calculate() {
      try {
        const inputs = getInputs();
        validate(inputs);
        const result = calculateEqualPayment(inputs);
        renderSummary(inputs, result);
        renderDetail(result.rows);
      } catch (err) {
        $('detailBody').innerHTML = `<tr><td colspan="6" class="center error" style="padding:20px;">${err.message}</td></tr>`;
        ['sumMonthlyPayment','sumEqualTotalPaid','sumEqualInterest','sumEqualInterestRatio','sumEqualLongRate']
          .forEach(id => $(id).textContent = '-');
      }
    }

    function resetForm() {
      $('loanAmount').value = 8800000;
      $('annualRate').value = 2.2;
      $('loanYears').value = 30;
      calculate();
    }

    ['loanAmount','annualRate','loanYears'].forEach(id => {
      $(id).addEventListener('input', calculate);
      $(id).addEventListener('change', calculate);
    });

    $('calcBtn').addEventListener('click', calculate);
    $('excelBtn').addEventListener('click', exportExcel);
    $('printBtn').addEventListener('click', () => window.print());
    $('resetBtn').addEventListener('click', resetForm);

    calculate();
  </script>
</body>
</html>
